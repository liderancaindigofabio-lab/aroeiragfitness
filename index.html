<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#d4af37">
<title>Aroeira G Fitness - Gestão de Alunos</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0a0a0a;color:#f5f5f5;min-height:100vh;padding:8px;font-size:14px;line-height:1.4}
  .header{background:linear-gradient(135deg,#1a1a1a,#0a0a0a);border:2px solid #d4af37;border-radius:12px;padding:12px;margin-bottom:8px;text-align:center}
  .header h1{color:#d4af37;font-size:20px;letter-spacing:1px}
  .header .sub{color:#888;font-size:11px;margin-top:4px}
  .stats-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:8px}
  .stat-box{background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:6px 2px;text-align:center}
  .stat-box .num{font-size:18px;font-weight:700;display:block}
  .stat-box .label{font-size:9px;color:#888;text-transform:uppercase}
  .stat-emdia .num{color:#00c853}
  .stat-pendente .num{color:#ffb300}
  .stat-vencido .num{color:#ff1744}
  .stat-atrasado .num{color:#b71c1c}
  .stat-semdata .num{color:#888}
  .login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
  .login-overlay.hidden{display:none}
  .login-box{background:#1a1a1a;border:2px solid #d4af37;border-radius:12px;padding:24px;max-width:320px;width:100%;text-align:center}
  .login-box h2{color:#d4af37;margin-bottom:16px}
  .login-box input{width:100%;padding:12px;background:#0a0a0a;border:1px solid #d4af37;border-radius:6px;color:#f5f5f5;font-size:14px;margin-bottom:12px}
  .login-box button{width:100%;padding:12px;background:#d4af37;color:#0a0a0a;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer}
  .login-box .err{color:#ff1744;font-size:12px;margin-top:8px;min-height:16px}
  .toolbar{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
  .btn{padding:8px 12px;background:#d4af37;color:#0a0a0a;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;flex:1;min-width:80px}
  .btn:active{transform:scale(.97)}
  .btn-sec{background:transparent;color:#d4af37;border:1px solid #d4af37}
  .search-box{width:100%;padding:10px;background:#1a1a1a;border:1px solid #d4af37;border-radius:6px;color:#f5f5f5;font-size:14px;margin-bottom:8px}
  .filters{display:flex;gap:4px;margin-bottom:8px;overflow-x:auto;padding-bottom:4px}
  .filter-btn{padding:6px 10px;background:#1a1a1a;color:#888;border:1px solid #333;border-radius:12px;font-size:11px;cursor:pointer;white-space:nowrap}
  .filter-btn.active{background:#d4af37;color:#0a0a0a;border-color:#d4af37}
  .student-list{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;max-height:55vh;overflow-y:auto}
  .student-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:8px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .student-card .info{flex:1;min-width:0}
  .student-card .name{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .student-card .meta{font-size:10px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .badge{font-size:9px;padding:3px 6px;border-radius:4px;font-weight:700;white-space:nowrap}
  .bg-emdia{background:rgba(0,200,83,.15);color:#00c853}
  .bg-pendente{background:rgba(255,179,0,.15);color:#ffb300}
  .bg-vencido{background:rgba(255,23,68,.15);color:#ff1744}
  .bg-atrasado{background:rgba(183,28,28,.25);color:#ff5252}
  .bg-semdata{background:rgba(255,255,255,.1);color:#888}
  .form-section{background:#1a1a1a;border:1px solid #d4af37;border-radius:8px;padding:12px;margin-bottom:12px}
  .form-section h3{color:#d4af37;font-size:14px;margin-bottom:8px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
  .form-row.full{grid-template-columns:1fr}
  .form-row input,.form-row select{width:100%;padding:8px;background:#0a0a0a;border:1px solid #333;border-radius:4px;color:#f5f5f5;font-size:12px}
  .form-row input:focus,.form-row select:focus{outline:none;border-color:#d4af37}
  .form-actions{display:flex;gap:6px;margin-top:8px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid #d4af37;color:#d4af37;padding:10px 20px;border-radius:6px;font-size:13px;z-index:999;display:none;max-width:90%;text-align:center}
  .toast.show{display:block;animation:slideUp .3s}
  .toast.error{border-color:#ff1744;color:#ff1744}
  @keyframes slideUp{from{opacity:0;transform:translate(-50%,20px)}to{opacity:1;transform:translate(-50%,0)}}
  .sync-info{text-align:center;color:#666;font-size:10px;padding:4px}
  .section-title{color:#d4af37;font-size:13px;font-weight:600;margin:8px 0 4px;display:flex;justify-content:space-between;align-items:center}
  .section-title .count{background:#d4af37;color:#0a0a0a;padding:2px 8px;border-radius:10px;font-size:11px}
  @media (min-width:768px){
    body{max-width:900px;margin:0 auto;padding:16px;font-size:15px}
    .header h1{font-size:28px}
    .stats-bar{grid-template-columns:repeat(5,1fr);gap:8px}
    .stat-box .num{font-size:24px}
    .student-list{max-height:60vh}
  }
</style>
</head>

<div id="loginOverlay" class="login-overlay">
  <form class="login-box" onsubmit="return doLogin(event)">
    <h2>🏋️ Aroeira G Fitness</h2>
    <p style="color:#888;font-size:12px;margin-bottom:16px">Gestão de Alunos v9</p>
    <input type="text" id="loginUser" placeholder="Usuário" autocomplete="username" required>
    <input type="password" id="loginPass" placeholder="Senha" autocomplete="current-password" required>
    <button type="submit">ENTRAR</button>
    <div class="err" id="loginErr"></div>
  </form>
</div>

<div id="app" class="hidden">
  <div class="header">
    <h1>🏋️ AROEIRA G FITNESS</h1>
    <div class="sub">Gestão de Alunos • v9 • 30/06/2026</div>
  </div>

  <div class="stats-bar">
    <div class="stat-box stat-emdia"><span class="num" id="cntEmDia">0</span><span class="label">Em Dia</span></div>
    <div class="stat-box stat-pendente"><span class="num" id="cntPendente">0</span><span class="label">Pendente</span></div>
    <div class="stat-box stat-vencido"><span class="num" id="cntVencido">0</span><span class="label">Vencido</span></div>
    <div class="stat-box stat-atrasado"><span class="num" id="cntAtrasado">0</span><span class="label">Atrasado</span></div>
    <div class="stat-box stat-semdata"><span class="num" id="cntSemData">0</span><span class="label">Sem Data</span></div>
  </div>

  <div class="toolbar">
    <button class="btn" onclick="showAddForm()">➕ NOVO</button>
    <button class="btn btn-sec" onclick="downloadJSON()">💾 BAIXAR</button>
    <button class="btn btn-sec" onclick="copyJSON()">📋 COPIAR</button>
  </div>

  <input type="text" class="search-box" id="searchBox" placeholder="🔍 buscar por nome, email ou telefone..." oninput="renderList()">

  <div class="filters" id="filters"></div>

  <div class="section-title">
    <span>👥 Alunos</span>
    <span class="count" id="visibleCount">0</span>
  </div>
  <div class="student-list" id="studentList"></div>

  <div id="formSection" class="form-section hidden">
    <h3>➕ Cadastrar Novo Aluno</h3>
    <div class="form-row full"><input type="text" id="fNome" placeholder="Nome completo"></div>
    <div class="form-row"><input type="email" id="fEmail" placeholder="Email"><input type="tel" id="fTel" placeholder="Telefone (XX) XXXXX-XXXX"></div>
    <div class="form-row"><select id="fPlano"><option value="">Selecione o plano</option><option>PLANO MENSAL</option><option>PLANO 1° MÊS</option><option>PLANO ANUAL</option><option>DIÁRIA</option><option>CRÉDITO 15 DIAS</option><option>CREDITO 30 DIAS</option><option>SEM PLANO</option></select><input type="number" id="fValor" placeholder="Valor (R$)" step="0.01"></div>
    <div class="form-row full"><input type="date" id="fVenc"></div>
    <div class="form-actions">
      <button class="btn" onclick="salvarAluno()">💾 SALVAR</button>
      <button class="btn btn-sec" onclick="document.getElementById('formSection').classList.add('hidden')">CANCELAR</button>
    </div>
  </div>

  <div class="sync-info" id="syncInfo">Carregando dados...</div>
</div>

<div id="toast" class="toast"></div>

// ============================
// ESTADO
// ============================
let students = [];
let history = [];
let lastUpdate = null;
let currentFilter = 'todos';
let searchQuery = '';

// ============================
// LOGIN
// ============================
function doLogin(e){
  e.preventDefault();
  const u = document.getElementById('loginUser').value;
  const p = document.getElementById('loginPass').value;
  if (u === 'admin' && p === '123456') {
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    carregarDados();
  } else {
    document.getElementById('loginErr').textContent = 'Usuário ou senha inválidos';
  }
  return false;
}

// ============================
// CARREGAR DADOS (GitHub > Fallback)
// ============================
async function carregarDados(){
  showInfo('Sincronizando com a nuvem...');
  let cloudOk = false;

  try {
    const url = 'https://raw.githubusercontent.com/liderancaindigofabio-lab/aroeiragfitness/main/aroeira_data.json?t=' + Date.now();
    const resp = await fetch(url, {cache: 'no-store'});
    if (resp.ok) {
      const data = await resp.json();
      if (Array.isArray(data.students) && data.students.length > 0) {
        students = data.students;
        history = data.history || [];
        lastUpdate = data.lastUpdate;
        cloudOk = true;
        showInfo('✓ ' + students.length + ' alunos carregados da nuvem');
      }
    }
  } catch(e) {
    console.warn('Falha ao buscar da nuvem:', e);
  }

  if (!cloudOk) {
    // Fallback: usa os dados embutidos na página
    students = EMBEDDED_DATA.students;
    history = EMBEDDED_DATA.history || [];
    lastUpdate = EMBEDDED_DATA.lastUpdate;
    showInfo('⚠ Usando dados locais (offline) — ' + students.length + ' alunos');
  }

  updateStats();
  renderFilters();
  renderList();
}

function showInfo(msg){
  document.getElementById('syncInfo').textContent = msg;
}

// ============================
// STATUS
// ============================
function getStatus(due){
  if (!due) return {text:'Sem Data', cls:'bg-semdata'};
  const today = new Date();
  today.setHours(0,0,0,0);
  const d = new Date(due);
  d.setHours(0,0,0,0);
  const diff = Math.floor((today - d) / 86400000);
  if (diff <= -2) return {text:'Em Dia', cls:'bg-emdia'};
  if (diff === -1) return {text:'Pendente', cls:'bg-pendente'};
  if (diff >= 1 && diff < 30) return {text:'Vencido', cls:'bg-vencido'};
  if (diff >= 30) return {text:'Atrasado', cls:'bg-atrasado'};
  return {text:'Em Dia', cls:'bg-emdia'};
}

function updateStats(){
  const c = {EmDia:0, Pendente:0, Vencido:0, Atrasado:0, SemData:0};
  students.forEach(s => {
    const st = getStatus(s.due);
    if (st.text === 'Em Dia') c.EmDia++;
    else if (st.text === 'Pendente') c.Pendente++;
    else if (st.text === 'Vencido') c.Vencido++;
    else if (st.text === 'Atrasado') c.Atrasado++;
    else if (st.text === 'Sem Data') c.SemData++;
  });
  document.getElementById('cntEmDia').textContent = c.EmDia;
  document.getElementById('cntPendente').textContent = c.Pendente;
  document.getElementById('cntVencido').textContent = c.Vencido;
  document.getElementById('cntAtrasado').textContent = c.Atrasado;
  document.getElementById('cntSemData').textContent = c.SemData;
}

// ============================
// FILTROS
// ============================
function renderFilters(){
  const filters = [
    {v:'todos',l:'Todos'},
    {v:'Em Dia',l:'🟢 Em Dia'},
    {v:'Pendente',l:'🟡 Pendente'},
    {v:'Vencido',l:'🔴 Vencido'},
    {v:'Atrasado',l:'🔴 Atrasado'},
    {v:'Sem Data',l:'⚪ Sem Data'}
  ];
  const el = document.getElementById('filters');
  el.innerHTML = filters.map(f =>
    `<button class="filter-btn ${f.v===currentFilter?'active':''}" onclick="setFilter('${f.v}')">${f.l}</button>`
  ).join('');
}

function setFilter(f){
  currentFilter = f;
  renderFilters();
  renderList();
}

// ============================
// LISTA
// ============================
function renderList(){
  const q = searchQuery.toLowerCase();
  const filtered = students.filter(s => {
    if (currentFilter !== 'todos' && getStatus(s.due).text !== currentFilter) return false;
    if (q && !(s.name.toLowerCase().includes(q) || (s.email||'').toLowerCase().includes(q) || (s.phone||'').toLowerCase().includes(q))) return false;
    return true;
  }).sort((a,b) => a.name.localeCompare(b.name, 'pt-BR'));

  document.getElementById('visibleCount').textContent = filtered.length;
  const el = document.getElementById('studentList');

  if (filtered.length === 0) {
    el.innerHTML = '<div style="text-align:center;color:#666;padding:20px">Nenhum aluno encontrado</div>';
    return;
  }

  el.innerHTML = filtered.map(s => {
    const st = getStatus(s.due);
    const dueFmt = s.due ? s.due.split('-').reverse().join('/') : '—';
    return `
      <div class="student-card">
        <div class="info">
          <div class="name">${escapeHtml(s.name)}</div>
          <div class="meta">${escapeHtml(s.plan || '—')} • ${dueFmt} • R$ ${(s.value||0).toFixed(2)}</div>
        </div>
        <span class="badge ${st.cls}">${st.text}</span>
      </div>
    `;
  }).join('');
}

function escapeHtml(t){
  if (!t) return '';
  return String(t).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// ============================
// BUSCA
// ============================
document.addEventListener('DOMContentLoaded', () => {
  const sb = document.getElementById('searchBox');
  if (sb) sb.addEventListener('input', e => { searchQuery = e.target.value; renderList(); });
});

// FORMULÁRIO
// ============================
function showAddForm(){
  document.getElementById('formSection').classList.remove('hidden');
  document.getElementById('formSection').scrollIntoView({behavior:'smooth'});
}

function salvarAluno(){
  const nome = document.getElementById('fNome').value.trim();
  if (!nome) { toast('Nome é obrigatório', true); return; }
  const novo = {
    id: students.length ? Math.max(...students.map(s => s.id||0)) + 1 : 1,
    name: nome,
    email: document.getElementById('fEmail').value.trim(),
    phone: document.getElementById('fTel').value.trim(),
    plan: document.getElementById('fPlano').value,
    value: parseFloat(document.getElementById('fValor').value) || 0,
    due: document.getElementById('fVenc').value || null,
    payment: getStatus(document.getElementById('fVenc').value || null).text,
    paymentHistory: [],
    evaluations: [],
    gymHistory: []
  };
  students.push(novo);
  updateStats();
  renderList();
  toast('✓ Aluno cadastrado! (salve manualmente pelo GitHub)');
  document.getElementById('fNome').value = '';
  document.getElementById('fEmail').value = '';
  document.getElementById('fTel').value = '';
  document.getElementById('fPlano').value = '';
  document.getElementById('fValor').value = '';
  document.getElementById('fVenc').value = '';
}

// ============================
// EXPORTAR
// ============================
function downloadJSON(){
  const data = {students, history, lastUpdate: new Date().toISOString()};
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'aroeira_data.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('✓ Arquivo baixado! Mande pelo WhatsApp');
}

async function copyJSON(){
  const data = {students, history, lastUpdate: new Date().toISOString()};
  const text = JSON.stringify(data, null, 2);
  try {
    await navigator.clipboard.writeText(text);
    toast('✓ JSON copiado!');
  } catch(e) {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('✓ JSON copiado!');
  }
}

// ============================
// TOAST
// ============================
function toast(msg, error){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('error', !!error);
  t.classList.add('show');
  clearTimeout(window._toastT);
  window._toastT = setTimeout(() => t.classList.remove('show'), 3500);
}
